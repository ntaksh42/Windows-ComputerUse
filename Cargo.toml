[package]
name = "windows-computeruse"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.103"
arboard = "3.6.1"
chrono = { version = "0.4.45", default-features = false, features = ["clock"] }
dirs = "6.0.0"
htmd = "0.5.4"
reqwest = { version = "0.13.4", default-features = false, features = ["rustls", "http2", "gzip", "json", "charset"] }
rmcp = { version = "2.2.0", features = ["server", "macros", "transport-io", "schemars"] }
schemars = "1.2.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1.53.0", features = ["full"] }
windows = { version = "0.62.2", features = ["UI_Notifications", "Data_Xml_Dom", "Foundation_Collections", "Win32_System_WinRT", "Win32_UI_Shell"] }
windows-registry = "0.6.1"
